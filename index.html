<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест: Какая профессия тебе подойдёт?</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap');

        :root {
            --bg-color: #0b0d17;
            --card-bg: rgba(255, 255, 255, 0.05);
            --primary-color: #00f3ff; /* Cyan Neon */
            --secondary-color: #bc13fe; /* Purple Neon */
            --text-color: #ffffff;
            --accent-a: #ff0055;
            --accent-b: #00f3ff;
            --accent-v: #00ff9d;
            --accent-g: #ffe600;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(188, 19, 254, 0.2) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(0, 243, 255, 0.2) 0%, transparent 20%);
            overflow-x: hidden;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            padding: 40px 0;
            animation: fadeIn 1s ease-in;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            text-transform: uppercase;
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }

        .subtitle {
            font-size: 1.1rem;
            color: #aaa;
            margin-bottom: 30px;
        }

        /* Quiz Styles */
        .question-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s forwards;
        }

        .question-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 40px rgba(0, 243, 255, 0.1);
            border-color: rgba(0, 243, 255, 0.3);
        }

        .question-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--primary-color);
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option-label {
            display: flex;
            align-items: flex-start;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid transparent;
        }

        .option-label:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.2);
        }

        input[type="radio"] {
            accent-color: var(--primary-color);
            margin-right: 15px;
            margin-top: 5px;
            transform: scale(1.2);
        }

        /* Button Styles */
        .submit-btn {
            display: block;
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--secondary-color), var(--primary-color));
            border: none;
            border-radius: 50px;
            color: white;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 30px;
            box-shadow: 0 0 20px rgba(188, 19, 254, 0.4);
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(0, 243, 255, 0.6);
        }

        /* Result Styles */
        #result-container {
            display: none;
            text-align: center;
            animation: zoomIn 0.5s ease;
        }

        .result-card {
            background: rgba(10, 10, 20, 0.9);
            border: 2px solid var(--primary-color);
            border-radius: 20px;
            padding: 40px;
            margin-top: 20px;
            box-shadow: 0 0 50px rgba(0, 243, 255, 0.2);
            position: relative;
            overflow: hidden;
        }

        .result-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        .result-type {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            color: var(--primary-color);
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--primary-color);
        }

        .result-desc {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #ddd;
        }

        .info-block {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            text-align: left;
        }

        .info-title {
            color: var(--secondary-color);
            font-weight: bold;
            margin-bottom: 5px;
            display: block;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .info-list {
            margin: 0;
            padding-left: 20px;
            color: #eee;
        }
        
        .info-list li {
            margin-bottom: 5px;
        }

        .restart-btn {
            background: transparent;
            border: 2px solid var(--primary-color);
            color: var(--primary-color);
            padding: 10px 30px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            margin-top: 20px;
            transition: all 0.3s;
        }

        .restart-btn:hover {
            background: var(--primary-color);
            color: #000;
            box-shadow: 0 0 20px var(--primary-color);
        }

        /* Animations */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomIn {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }

        /* Responsive */
        @media (max-width: 600px) {
            h1 { font-size: 1.8rem; }
            .question-card { padding: 15px; }
            .result-card { padding: 20px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Профориентация 2.0</h1>
        <div class="subtitle">Узнай своё будущее с помощью ИИ-теста</div>
    </header>

    <div id="quiz-form">
        <!-- Questions will be injected here by JS -->
    </div>

    <button class="submit-btn" onclick="calculateResult()">Узнать результат</button>

    <div id="result-container">
        <div class="result-card">
            <h2 class="result-type" id="res-type"></h2>
            <p class="result-desc" id="res-desc"></p>
            
            <div class="info-block">
                <span class="info-title">💼 Понятные профессии:</span>
                <ul class="info-list" id="res-jobs"></ul>
            </div>

            <div class="info-block">
                <span class="info-title">🚀 Профессии будущего:</span>
                <ul class="info-list" id="res-future"></ul>
            </div>

            <div class="info-block">
                <span class="info-title">🛠️ Попробуй сейчас:</span>
                <ul class="info-list" id="res-try"></ul>
            </div>

            <div class="info-block">
                <span class="info-title">📍 Где попробовать в МО:</span>
                <p style="margin: 5px 0 0 0; font-size: 0.95rem;" id="res-place"></p>
            </div>

            <button class="restart-btn" onclick="location.reload()">Пройти заново</button>
        </div>
    </div>
</div>

<script>
    // Data from the file
    const questions = [
        {
            q: "Что тебе интереснее делать в свободное время?",
            options: [
                { text: "Рисовать, фотографировать, снимать видео или оформлять красивые вещи", type: "A" },
                { text: "Собирать конструкторы, разбираться в технике или играть в логические игры", type: "B" },
                { text: "Помогать друзьям, общаться в компании или участвовать в мероприятиях", type: "V" },
                { text: "Читать энциклопедии, наблюдать за природой или искать ответы на вопросы", type: "G" }
            ]
        },
        {
            q: "Если бы ты создал что-то полезное для школы, это было бы:",
            options: [
                { text: "Школьная газета, плакат к празднику или оформление кабинета", type: "A" },
                { text: "Расписание на экране, таблица для учёта книг или простой сайт", type: "B" },
                { text: "Клуб по интересам, помощь первоклассникам или сбор вещей для приюта", type: "V" },
                { text: "Карта деревьев школьного двора, исследование «Почему мы любим разные предметы»", type: "G" }
            ]
        },
        {
            q: "В групповом проекте тебе ближе роль:",
            options: [
                { text: "Придумать идею, нарисовать эскизы, выбрать цвета и шрифты", type: "A" },
                { text: "Собрать техническую часть: презентацию, таблицы, настроить оборудование", type: "B" },
                { text: "Распределить задания, поддержать тех, кто сомневается, договориться с учителем", type: "V" },
                { text: "Найти информацию в книгах и интернете, проверить факты, сделать выводы", type: "G" }
            ]
        },
        {
            q: "Тебе нравится решать задачи, где:",
            options: [
                { text: "Можно придумать что-то новое и красивое", type: "A" },
                { text: "Нужно собрать всё по шагам, как пазл или конструктор", type: "B" },
                { text: "Важно понять другого человека и помочь ему", type: "V" },
                { text: "Требуется найти информацию и разобраться в причинах", type: "G" }
            ]
        },
        {
            q: "Что вызывает у тебя чувство гордости?",
            options: [
                { text: "Когда кто-то говорит: «Как здорово ты нарисовал(а)!» или «Как красиво оформил(а)!»", type: "A" },
                { text: "Когда ты сам(а) разобрался(ась) в сложной задаче или починил(а) что-то", type: "B" },
                { text: "Когда тебе благодарят за помощь или говорят: «Ты хороший друг»", type: "V" },
                { text: "Когда ты нашёл(а) ответ, который никто не знал", type: "G" }
            ]
        },
        {
            q: "Какой урок в школе тебе нравится больше всего?",
            options: [
                { text: "ИЗО, технология, музыка — где можно создавать что-то своими руками", type: "A" },
                { text: "Информатика, математика, физика — где есть логика и решение задач", type: "B" },
                { text: "Литература, обществознание, классный час — где говорим о людях и отношениях", type: "V" },
                { text: "Биология, география, химия — где узнаём, как устроен мир", type: "G" }
            ]
        },
        {
            q: "Какой герой тебе ближе?",
            options: [
                { text: "Художник, фотограф, модельер — тот, кто создаёт красоту", type: "A" },
                { text: "Инженер, программист, изобретатель — тот, кто создаёт технологии", type: "B" },
                { text: "Учитель, врач, вожатый — тот, кто помогает людям", type: "V" },
                { text: "Учёный, следователь, натуралист — тот, кто ищет правду", type: "G" }
            ]
        },
        {
            q: "Если бы у тебя был суперскилл, какой бы ты выбрал?",
            options: [
                { text: "Уметь рисовать всё, что представляешь, и создавать красивые вещи", type: "A" },
                { text: "Уметь чинить любую технику и создавать работающие устройства", type: "B" },
                { text: "Уметь понимать людей и помогать им решать проблемы", type: "V" },
                { text: "Уметь находить любую информацию и видеть то, чего не видят другие", type: "G" }
            ]
        },
        {
            q: "Что тебя мотивирует работать над проектом до конца?",
            options: [
                { text: "Возможность показать свою работу и получить похвалу за творчество", type: "A" },
                { text: "Чувство, что ты создал(а) что-то реально работающее", type: "B" },
                { text: "Осознание, что твоя работа помогает другим людям", type: "V" },
                { text: "Открытие чего-то нового или решение загадки", type: "G" }
            ]
        },
        {
            q: "Где ты видишь себя через 10 лет?",
            options: [
                { text: "В творческой студии, на съёмочной площадке или в дизайнерской мастерской", type: "A" },
                { text: "В офисе с компьютером, в лаборатории или за пультом управления техникой", type: "B" },
                { text: "В школе, больнице, офисе — там, где много общения с людьми", type: "V" },
                { text: "В научном центре, заповеднике или архиве — там, где можно исследовать", type: "G" }
            ]
        }
    ];

    const resultsData = {
        A: {
            type: "🎨 ТВОРЧЕСКИЙ ТИП",
            desc: "Ты любишь создавать красоту, придумывать новое и выражать себя через рисунок, дизайн, фото или видео.",
            jobs: ["Художник-иллюстратор", "Дизайнер (графический, интерьеров, одежды)", "Фотограф / видеоблогер", "Архитектор", "Парикмахер-стилист"],
            future: ["3D-художник для игр и фильмов", "Создатель цифровой моды (виртуальная одежда)", "Дизайнер виртуальных пространств (метавселенные)"],
            try: ["Оформи плакат к школьному празднику", "Создай обложку для альбома класса в Canva", "Сними короткий ролик о жизни твоего класса"],
            place: "Дома творчества, кружки «Юный художник», бесплатные курсы в «Точке кипения» (МФТИ) по цифровому искусству"
        },
        B: {
            type: "⚙️ ТЕХНИЧЕСКИЙ ТИП",
            desc: "Тебе нравится разбираться в технике, решать логические задачи и создавать работающие системы.",
            jobs: ["Программист / разработчик приложений", "Инженер (механик, электрик, строитель)", "Веб-дизайнер", "Системный администратор", "Водитель БПЛА (дронов)"],
            future: ["Инженер беспилотных систем", "Специалист по этике искусственного интеллекта", "Тренер ИИ (обучает нейросети)"],
            try: ["Собери простого робота на базе конструктора", "Создай сайт-визитку о себе в конструкторе (Tilda, Wix)", "Напиши простую игру в Scratch"],
            place: "Кванториумы в Подмосковье, курсы «Алгоритмика», школьные IT-кружки, профильные классы с уклоном в информатику"
        },
        V: {
            type: "👥 СОЦИАЛЬНЫЙ ТИП",
            desc: "Тебе нравится помогать людям, находить общий язык и создавать гармонию в коллективе.",
            jobs: ["Учитель / воспитатель", "Врач / медсестра", "Психолог", "Тренер / инструктор", "Специалист по работе с клиентами"],
            future: ["Коуч для подростков (помощь в выборе профессии)", "Специалист по цифровому этикету", "Медиатор (помогает решать конфликты)"],
            try: ["Проведи викторину для младших классов", "Организуй сбор книг или игрушек для детского дома", "Стань волонтёром на школьном мероприятии"],
            place: "Дома молодёжи (волонтёрские школы), курсы «Юный психолог», летние профильные смены в лагерях Подмосковья"
        },
        G: {
            type: "🔬 ИССЛЕДОВАТЕЛЬСКИЙ ТИП",
            desc: "Тебе нравится искать информацию, наблюдать за природой и находить закономерности.",
            jobs: ["Биолог / эколог", "Геолог / метеоролог", "Лаборант / фармацевт", "Журналист-расследователь", "Археолог"],
            future: ["Биоинформатик (работа с ДНК и данными)", "Климатический аналитик", "Специалист по космическому мусору"],
            try: ["Проведи наблюдение: какие птицы прилетают к кормушке зимой", "Собери гербарий растений школьного двора", "Напиши мини-исследование «Почему одноклассники любят разные игры»"],
            place: "Юношеские академии наук при вузах, кружки «Юный натуралист» в заповедниках Подмосковья, летние экологические смены"
        }
    };

    // Render Questions
    const quizContainer = document.getElementById('quiz-form');
    
    questions.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        card.style.animationDelay = `${index * 0.1}s`;

        const title = document.createElement('div');
        title.className = 'question-title';
        title.innerText = `Вопрос ${index + 1}: ${item.q}`;
        card.appendChild(title);

        const optionsDiv = document.createElement('div');
        optionsDiv.className = 'options';

        item.options.forEach((opt, optIndex) => {
            const label = document.createElement('label');
            label.className = 'option-label';
            
            const input = document.createElement('input');
            input.type = 'radio';
            input.name = `q${index}`;
            input.value = opt.type;

            const text = document.createElement('span');
            text.innerText = opt.text;

            label.appendChild(input);
            label.appendChild(text);
            optionsDiv.appendChild(label);
        });

        card.appendChild(optionsDiv);
        quizContainer.appendChild(card);
    });

    // Calculate Result
    function calculateResult() {
        let scores = { A: 0, B: 0, V: 0, G: 0 };
        let allAnswered = true;

        for (let i = 0; i < questions.length; i++) {
            const selected = document.querySelector(`input[name="q${i}"]:checked`);
            if (!selected) {
                allAnswered = false;
                break;
            }
            scores[selected.value]++;
        }

        if (!allAnswered) {
            alert("Пожалуйста, ответьте на все вопросы, чтобы получить точный результат!");
            return;
        }

        // Find max score
        let maxScore = 0;
        let resultType = 'A';

        for (const [key, value] of Object.entries(scores)) {
            if (value > maxScore) {
                maxScore = value;
                resultType = key;
            }
        }

        displayResult(resultType);
    }

    function displayResult(type) {
        const data = resultsData[type];
        
        // Hide form and button
        document.getElementById('quiz-form').style.display = 'none';
        document.querySelector('.submit-btn').style.display = 'none';
        
        // Fill result data
        document.getElementById('res-type').innerText = data.type;
        document.getElementById('res-desc').innerText = data.desc;
        
        const jobsList = document.getElementById('res-jobs');
        data.jobs.forEach(job => {
            const li = document.createElement('li');
            li.innerText = job;
            jobsList.appendChild(li);
        });

        const futureList = document.getElementById('res-future');
        data.future.forEach(job => {
            const li = document.createElement('li');
            li.innerText = job;
            futureList.appendChild(li);
        });

        const tryList = document.getElementById('res-try');
        data.try.forEach(item => {
            const li = document.createElement('li');
            li.innerText = item;
            tryList.appendChild(li);
        });

        document.getElementById('res-place').innerText = data.place;

        // Show result container
        document.getElementById('result-container').style.display = 'block';
        window.scrollTo(0, document.body.scrollHeight);
    }
</script>

</body>
</html>
